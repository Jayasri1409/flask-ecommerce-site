<!DOCTYPE html>
<html>

<head>
<title>Jayasri Tech Store</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.navbar{
background:#1a1a1a;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.search{
padding:7px;
border-radius:5px;
border:none;
}

.container{
width:90%;
margin:auto;
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.product-card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
position:relative;
}

.product-card img{
width:160px;
height:160px;
object-fit:contain;
}

.category{
position:absolute;
top:10px;
left:10px;
background:#ff9800;
color:white;
padding:3px 8px;
font-size:12px;
border-radius:4px;
}

.badge{
position:absolute;
top:10px;
right:10px;
background:#e53935;
color:white;
padding:4px 8px;
font-size:12px;
border-radius:4px;
}

.price{
color:#007bff;
font-weight:bold;
}

.old-price{
text-decoration:line-through;
color:gray;
font-size:14px;
}

.btn{
display:inline-block;
margin-top:8px;
padding:8px 14px;
background:#007bff;
color:white;
text-decoration:none;
border-radius:5px;
}

.cart-btn{
background:#28a745;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">
<h2>Jayasri Tech Store</h2>
<input class="search" type="text" placeholder="Search products">
</div>

<div class="container">

{% for p in products %}

<div class="product-card">

<div class="category">{{p.category}}</div>

{% if p.badge %}
<div class="badge">{{p.badge}}</div>
{% endif %}

<img src="{{ url_for('static', filename='images/' + p.image) }}">

<h3>{{p.name}}</h3>

<p class="price">₹{{p.price}}</p>
<p class="old-price">₹{{p.old_price}}</p>

<a class="btn" href="/product/{{p.id}}">View Details</a>

<button class="btn cart-btn" onclick="addToCart()">Add to Cart</button>

</div>

{% endfor %}

</div>

<div id="cartMessage" style="display:none;position:fixed;bottom:20px;right:20px;background:#28a745;color:white;padding:12px;border-radius:6px;">
Added to your cart ✓
</div>

<script>

function addToCart(){

let message = document.getElementById("cartMessage")

message.style.display="block"

setTimeout(function(){
message.style.display="none"
},2000)

}

</script>

</body>
</html>
