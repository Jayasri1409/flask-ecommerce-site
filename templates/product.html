<!DOCTYPE html>
<html>

<head>
<title>Product Details</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.container{
width:80%;
margin:auto;
margin-top:40px;
display:flex;
gap:40px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

img{
width:300px;
object-fit:contain;
}

.price{
color:#007bff;
font-size:22px;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 16px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<img src="{{ url_for('static', filename='images/' + product.image) }}">

<div>

<h2>{{product.name}}</h2>

<p>{{product.description}}</p>

<p class="price">₹{{product.price}}</p>

<p class="old">₹{{product.old_price}}</p>

<a class="btn" href="/">Back to Products</a>

</div>

</div>

</body>
</html>
