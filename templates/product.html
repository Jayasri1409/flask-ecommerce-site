<!DOCTYPE html>
<html>
<head>
<title>{{product.name}}</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.container{
width:70%;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

img{
width:300px;
}

.price{
font-size:22px;
color:#007bff;
font-weight:bold;
}

.desc{
margin-top:15px;
font-size:16px;
color:#555;
}

.btn{
display:inline-block;
margin-top:20px;
padding:10px 18px;
background:#007bff;
color:white;
text-decoration:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>{{product.name}}</h1>

<img src="{{ url_for('static', filename='images/' + product.image) }}">

<p class="price">Price: ₹{{product.price}}</p>

<p class="desc">{{product.description}}</p>

<a class="btn" href="/">Back to Home</a>

</div>

</body>
</html>
